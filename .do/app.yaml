name: whisperstalk-monorepo
region: fra
services:
  - name: backend
    github:
      repo: ivan-vukasinovic-devinity/whisperstalk-monorepo
      branch: main
      deploy_on_push: true
    source_dir: backend
    dockerfile_path: Dockerfile
    http_port: 8080
    instance_count: 1
    instance_size_slug: basic-xxs
    envs:
      - key: APP_NAME
        scope: RUN_TIME
        value: Whispers Backend
      - key: API_V1_PREFIX
        scope: RUN_TIME
        value: /api/v1
      - key: CORS_ORIGINS
        scope: RUN_TIME
        value: https://your-frontend-domain.com
      - key: DATABASE_URL
        scope: RUN_TIME
        type: SECRET
        value: ${db.DATABASE_URL}
static_sites:
  - name: frontend
    github:
      repo: ivan-vukasinovic-devinity/whisperstalk-monorepo
      branch: main
      deploy_on_push: true
    source_dir: frontend
    build_command: npm ci && npm run build
    output_dir: dist
    envs:
      - key: VITE_API_URL
        scope: BUILD_TIME
        value: https://your-backend-domain.com/api/v1
    routes:
      - path: /
databases:
  - name: db
    engine: PG
    num_nodes: 1
    size: db-s-1vcpu-1gb
    version: "16"
